document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  }\n  .brand img.logo {\n    display: block;\n    height: 72px;\n    width: auto;\n  }\n  .foot .brand img.logo { height: 48px; }\n\n  /* ---------------- Hero ---------------- */\n  .hero {\n    padding: 80px 0 60px;\n    position: relative;\n  }\n  .eyebrow {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    font-size: 13px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-weight: 600;\n    color: var(--green);\n    margin-bottom: 28px;\n  }\n  .eyebrow .dot {\n    width: 8px; height: 8px; border-radius: 50%;\n    background: var(--green);\n    animation: pulse 2.4s ease-in-out infinite;\n  }\n  @keyframes pulse {\n    0%, 100% { opacity: 1; transform: scale(1); }\n    50% { opacity: 0.5; transform: scale(1.35); }\n  }\n\n  h1.headline {\n    font-family: \"DM Serif Display\", serif;\n    font-weight: 400;\n    font-size: clamp(48px, 8.4vw, 124px);\n    line-height: 0.96;\n    letter-spacing: -0.015em;\n    margin: 0 0 32px;\n    color: var(--dark);\n    text-wrap: balance;\n  }\n  h1.headline .line { display: block; overflow: hidden; }\n  h1.headline .line .inner {\n    display: inline-block;\n    transform: translateY(110%);\n    animation: rise 1.05s cubic-bezier(.2,.7,.15,1) forwards;\n  }\n  h1.headline .line:nth-child(2) .inner { animation-delay: 0.12s; }\n  h1.headline em {\n    font-style: italic;\n    color: var(--green);\n  }\n  @keyframes rise {\n    to { transform: translateY(0); }\n  }\n\n  .hero-sub {\n    font-size: clamp(19px, 2vw, 24px);\n    max-width: 640px;\n    line-height: 1.45;\n    color: var(--dark);\n    opacity: 0;\n    transform: translateY(14px);\n    animation: fadeUp 0.9s ease 0.55s forwards;\n  }\n  .hero-sub strong { font-weight: 600; }\n\n  @keyframes fadeUp {\n    to { opacity: 1; transform: translateY(0); }\n  }\n\n  .hero-cta-row {\n    display: flex;\n    flex-wrap: wrap;\n    align-items: center;\n    gap: 22px;\n    margin-top: 44px;\n    opacity: 0;\n    transform: translateY(14px);\n    animation: fadeUp 0.9s ease 0.75s forwards;\n  }\n\n  .btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 14px;\n    background: var(--dark);\n    color: var(--cream);\n    text-decoration: none;\n    padding: 20px 30px 20px 32px;\n    border-radius: 999px;\n    font-weight: 500;\n    font-size: 17px;\n    letter-spacing: 0.01em;\n    transition: transform .25s ease, background .25s ease, box-shadow .25s ease;\n    box-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 8px 24px -10px rgba(3,50,32,0.4);\n  }\n  .btn:hover {\n    background: var(--green);\n    transform: translateY(-2px);\n    box-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 14px 30px -10px rgba(37,127,0,0.45);\n  }\n  .btn .arrow {\n    width: 30px; height: 30px;\n    border-radius: 50%;\n    background: var(--cream);\n    color: var(--dark);\n    display: grid; place-items: center;\n    transition: transform .25s ease;\n  }\n  .btn:hover .arrow { transform: translateX(3px); }\n  .btn .arrow svg { width: 14px; height: 14px; }\n\n  .hero-meta {\n    font-size: 14px;\n    color: var(--dark);\n    opacity: 0.7;\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n  }\n  .hero-meta .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }\n\n  /* Floating mark */\n  .hero-mark {\n    position: absolute;\n    right: -60px;\n    top: 90px;\n    width: 360px;\n    height: 360px;\n    opacity: 0.07;\n    pointer-events: none;\n    animation: drift 18s ease-in-out infinite;\n  }\n  @keyframes drift {\n    0%, 100% { transform: translateY(0) rotate(-6deg); }\n    50% { transform: translateY(-20px) rotate(2deg); }\n  }\n  @media (max-width: 900px) { .hero-mark { display: none; } }\n\n  /* ---------------- Translation demo ---------------- */\n  .demo {\n    padding: 60px 0 100px;\n  }\n  .demo-grid {\n    display: grid;\n    grid-template-columns: 1fr 80px 1fr;\n    gap: 24px;\n    align-items: stretch;\n  }\n  @media (max-width: 880px) {\n    .demo-grid { grid-template-columns: 1fr; }\n  }\n\n  .panel {\n    background: #fff;\n    border: 1px solid var(--rule);\n    border-radius: 22px;\n    padding: 28px 30px 30px;\n    position: relative;\n    min-height: 260px;\n    display: flex;\n    flex-direction: column;\n  }\n  .panel.before {\n    background: #fff7f1;\n  }\n  .panel.after {\n    background: var(--dark);\n    color: var(--cream);\n    border-color: var(--dark);\n  }\n  .panel-label {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 12px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-weight: 600;\n    margin-bottom: 18px;\n    opacity: 0.75;\n  }\n  .panel.after .panel-label { color: var(--cream); opacity: 0.85; }\n  .panel-label .sq { width: 8px; height: 8px; border-radius: 2px; background: var(--green); }\n\n  .panel p {\n    margin: 0;\n    font-size: 17px;\n    line-height: 1.55;\n    min-height: 7.5em;\n  }\n  .panel.after p { color: var(--cream); }\n\n  .typed::after {\n    content: \"▍\";\n    display: inline-block;\n    margin-left: 2px;\n    color: var(--green);\n    animation: blink 1s steps(1) infinite;\n    opacity: 0.85;\n  }\n  .typed.done::after { display: none; }\n  @keyframes blink { 50% { opacity: 0; } }\n\n  .arrow-cell {\n    display: grid;\n    place-items: center;\n  }\n  .arrow-cell .arrow-anim {\n    width: 60px;\n    height: 60px;\n    border-radius: 50%;\n    background: var(--green);\n    color: var(--cream);\n    display: grid;\n    place-items: center;\n    box-shadow: 0 10px 30px -10px rgba(37,127,0,0.5);\n  }\n  .arrow-cell svg { width: 22px; height: 22px; }\n  @media (max-width: 880px) {\n    .arrow-cell .arrow-anim { transform: rotate(90deg); }\n  }\n\n  /* ---------------- Explanation ---------------- */\n  .explain {\n    background: var(--dark);\n    color: var(--cream);\n    padding: 130px 0 140px;\n    position: relative;\n    overflow: hidden;\n  }\n  .explain::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background:\n      radial-gradient(circle at 12% 20%, rgba(37,127,0,0.18), transparent 40%),\n      radial-gradient(circle at 88% 80%, rgba(255,239,230,0.06), transparent 45%);\n    pointer-events: none;\n  }\n  .explain .wrap { position: relative; }\n\n  .explain-eyebrow {\n    font-size: 13px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--green-soft);\n    font-weight: 600;\n    margin-bottom: 36px;\n  }\n  .explain p {\n    font-family: \"DM Serif Display\", serif;\n    font-weight: 400;\n    font-size: clamp(28px, 3.4vw, 46px);\n    line-height: 1.18;\n    letter-spacing: -0.01em;\n    max-width: 1040px;\n    margin: 0;\n    text-wrap: balance;\n  }\n  .explain p .accent { color: var(--green-soft); font-style: italic; }\n  .explain .word {\n    display: inline-block;\n    opacity: 0;\n    transform: translateY(14px);\n    transition: opacity 0.6s ease, transform 0.6s ease;\n  }\n  .explain.in .word { opacity: 1; transform: translateY(0); }\n\n  /* ---------------- Features ---------------- */\n  .features {\n    padding: 130px 0 130px;\n  }\n  .features-head {\n    display: flex;\n    align-items: flex-end;\n    justify-content: space-between;\n    gap: 40px;\n    margin-bottom: 64px;\n    flex-wrap: wrap;\n  }\n  .features-head h2 {\n    font-family: \"DM Serif Display\", serif;\n    font-weight: 400;\n    font-size: clamp(38px, 5vw, 64px);\n    line-height: 1.02;\n    letter-spacing: -0.01em;\n    margin: 14px 0 0;\n    max-width: 720px;\n    text-wrap: balance;\n  }\n  .features-head h2 em { font-style: italic; color: var(--green); }\n  .features-head .lead {\n    max-width: 360px;\n    font-size: 17px;\n    line-height: 1.55;\n    opacity: 0.78;\n  }\n\n  .feature-grid {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 18px;\n  }\n  @media (max-width: 1080px) { .feature-grid { grid-template-columns: repeat(2, 1fr); } }\n  @media (max-width: 560px) { .feature-grid { grid-template-columns: 1fr; } }\n\n  .feature {\n    background: #fff;\n    border: 1px solid var(--rule);\n    border-radius: 22px;\n    padding: 30px 28px 32px;\n    display: flex;\n    flex-direction: column;\n    gap: 18px;\n    min-height: 280px;\n    position: relative;\n    overflow: hidden;\n    transition: transform .35s ease, box-shadow .35s ease, background .35s ease;\n    opacity: 0;\n    transform: translateY(28px);\n  }\n  .feature.in {\n    opacity: 1;\n    transform: translateY(0);\n    transition: opacity .8s ease, transform .8s ease, box-shadow .35s ease, background .35s ease;\n  }\n  .feature:hover {\n    transform: translateY(-6px);\n    box-shadow: 0 24px 50px -28px rgba(3,50,32,0.35);\n  }\n\n  .feature-num {\n    font-family: \"DM Serif Display\", serif;\n    font-size: 14px;\n    color: var(--green);\n    letter-spacing: 0.05em;\n  }\n  .feature-icon {\n    width: 56px; height: 56px;\n    border-radius: 14px;\n    background: var(--cream);\n    display: grid; place-items: center;\n    color: var(--dark);\n  }\n  .feature-icon svg { width: 28px; height: 28px; }\n\n  .feature h3 {\n    font-family: \"DM Serif Display\", serif;\n    font-weight: 400;\n    font-size: 28px;\n    line-height: 1.08;\n    margin: 0;\n    letter-spacing: -0.005em;\n  }\n  .feature p {\n    margin: 0;\n    font-size: 15.5px;\n    line-height: 1.5;\n    color: var(--dark);\n    opacity: 0.78;\n  }\n\n  /* ---------------- Final CTA ---------------- */\n  .final {\n    background: var(--cream);\n    padding: 0 0 120px;\n  }\n  .final-card {\n    background: var(--dark);\n    color: var(--cream);\n    border-radius: 32px;\n    padding: 90px 70px;\n    position: relative;\n    overflow: hidden;\n  }\n  .final-card::before {\n    content: \"\";\n    position: absolute;\n    width: 700px; height: 700px;\n    right: -260px; top: -260px;\n    border-radius: 50%;\n    background: radial-gradient(circle, rgba(37,127,0,0.45), transparent 65%);\n    pointer-events: none;\n  }\n  .final-card::after {\n    content: \"\";\n    position: absolute;\n    width: 480px; height: 480px;\n    left: -180px; bottom: -240px;\n    border-radius: 50%;\n    background: radial-gradient(circle, rgba(255,239,230,0.08), transparent 65%);\n    pointer-events: none;\n  }\n  .final-inner {\n    position: relative;\n    display: flex;\n    align-items: flex-end;\n    justify-content: space-between;\n    gap: 50px;\n    flex-wrap: wrap;\n  }\n  .final h2 {\n    font-family: \"DM Serif Display\", serif;\n    font-weight: 400;\n    font-size: clamp(40px, 5.5vw, 72px);\n    line-height: 1.0;\n    letter-spacing: -0.01em;\n    margin: 0;\n    max-width: 720px;\n    text-wrap: balance;\n  }\n  .final h2 em { font-style: italic; color: var(--green-soft); }\n  .final-sub {\n    margin-top: 22px;\n    font-size: 18px;\n    opacity: 0.78;\n    max-width: 520px;\n  }\n  .btn.btn-cream {\n    background: var(--cream);\n    color: var(--dark);\n  }\n  .btn.btn-cream:hover { background: #fff; }\n  .btn.btn-cream .arrow { background: var(--dark); color: var(--cream); }\n\n  @media (max-width: 720px) {\n    .final-card { padding: 56px 32px; border-radius: 24px; }\n  }\n\n  /* ---------------- Footer ---------------- */\n  footer.site {\n    padding: 0 0 40px;\n  }\n  .foot {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 20px;\n    padding-top: 30px;\n    border-top: 1px solid var(--rule);\n    font-size: 14px;\n    color: var(--dark);\n    opacity: 0.7;\n    flex-wrap: wrap;\n  }\n  .foot .brand-word { font-size: 18px; }\n\n  /* Scroll reveal base */\n  .reveal {\n    opacity: 0;\n    transform: translateY(24px);\n    transition: opacity 0.9s ease, transform 0.9s ease;\n  }\n  .reveal.in { opacity: 1; transform: translateY(0); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ============ HEADER ============ -->\n<header class=\"site\">\n  <div class=\"wrap\">\n    <a class=\"brand\" href=\"#\" aria-label=\"The AVOCADO HUB\">\n      <img class=\"logo\" src=\"3b9986cf-2653-4c47-9f54-1b1b055fe720\" alt=\"The AVOCADO HUB\">\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============ HERO ============ -->\n<section class=\"hero\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan> The Grant Writing Translator<\u002Fdiv>\n\n    <h1 class=\"headline\">\n      <span class=\"line\"><span class=\"inner\">Your Messy Reality.<\u002Fspan><\u002Fspan>\n      <span class=\"line\"><span class=\"inner\"><em>Funder-Ready<\u002Fem> Language.<\u002Fspan><\u002Fspan>\n    <\u002Fh1>\n\n    <p class=\"hero-sub\">\n      Free AI-powered grant writing tool for <strong>nonprofits, CICs and CIOs<\u002Fstrong>.\n    <\u002Fp>\n\n    <div class=\"hero-cta-row\">\n      <a class=\"btn\" href=\"https://avocado-grant-hub--viscouscoup.replit.app/\" target=\"_blank\" rel=\"noopener\">\n        Translate Your Grant\n        <span class=\"arrow\" aria-hidden=\"true\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n      <\u002Fa>\n      <span class=\"hero-meta\"><span class=\"pip\"><\u002Fspan> Free to use · No signup wall<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Decorative leaf -->\n    <svg class=\"hero-mark\" viewBox=\"0 0 200 200\" fill=\"none\" aria-hidden=\"true\">\n      <path d=\"M100 20c-30 0-55 30-55 80s25 80 55 80 55-40 55-80-25-80-55-80Z\" stroke=\"#033220\" stroke-width=\"1.5\"><\u002Fpath>\n      <path d=\"M100 35c-22 0-42 25-42 65s20 65 42 65 42-30 42-65-20-65-42-65Z\" stroke=\"#033220\" stroke-width=\"1.5\"><\u002Fpath>\n      <circle cx=\"100\" cy=\"110\" r=\"22\" fill=\"#033220\"><\u002Fcircle>\n    <\u002Fsvg>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TRANSLATION DEMO ============ -->\n<section class=\"demo\">\n  <div class=\"wrap\">\n    <div class=\"demo-grid reveal\">\n      <div class=\"panel before\">\n        <div class=\"panel-label\"><span class=\"sq\"><\u002Fspan> What you actually wrote<\u002Fdiv>\n        <p id=\"before-text\" class=\"typed\"><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"arrow-cell\">\n        <div class=\"arrow-anim\" aria-hidden=\"true\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"panel after\">\n        <div class=\"panel-label\"><span class=\"sq\"><\u002Fspan> Funder-ready version<\u002Fdiv>\n        <p id=\"after-text\" class=\"typed\"><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ EXPLANATION ============ -->\n<section class=\"explain\" id=\"explain\">\n  <div class=\"wrap\">\n    <div class=\"explain-eyebrow\">Why we built it<\u002Fdiv>\n    <p id=\"explain-copy\">\nGrant writing is hard when your reality doesn't match what funders want to hear. The Grant Writing Translator lets you write exactly what you mean in your own words and turns it into the <span class=\"accent\">professional, compelling language<\u002Fspan> funders expect. No blank page panic. No jargon. Just honest, fundable writing.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FEATURES ============ -->\n<section class=\"features\">\n  <div class=\"wrap\">\n    <div class=\"features-head\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan> What it does<\u002Fdiv>\n        <h2>Four things it does <em>brilliantly<\u002Fem>.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lead\">\n        Built around how grant applications actually get written — messy, in chunks, with revisions on revisions.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"feature-grid\">\n      <div class=\"feature\">\n        <div class=\"feature-num\">01<\u002Fdiv>\n        <div class=\"feature-icon\">\n          <svg viewBox=\"0 0 32 32\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M6 22V10l5-5 5 5v12\"><\u002Fpath>\n            <path d=\"M16 12h6l4 4v6h-10\"><\u002Fpath>\n            <path d=\"M10 22v4M22 22v4\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Reframes Weaknesses<\u002Fh3>\n        <p>Turns the bits you're worried about — small team, modest data, early stage — into the honest, confident framing funders respond to.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"feature\">\n        <div class=\"feature-num\">02<\u002Fdiv>\n        <div class=\"feature-icon\">\n          <svg viewBox=\"0 0 32 32\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <rect x=\"5\" y=\"6\" width=\"22\" height=\"5\" rx=\"1.5\"><\u002Frect>\n            <rect x=\"5\" y=\"14\" width=\"22\" height=\"5\" rx=\"1.5\"><\u002Frect>\n            <rect x=\"5\" y=\"22\" width=\"14\" height=\"5\" rx=\"1.5\"><\u002Frect>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Section by Section<\u002Fh3>\n        <p>Work through Aims, Need, Outcomes, Budget — one section at a time. No staring down a 4,000-word blank document.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"feature\">\n        <div class=\"feature-num\">03<\u002Fdiv>\n        <div class=\"feature-icon\">\n          <svg viewBox=\"0 0 32 32\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M5 22.5V27h4.5L24 12.5 19.5 8 5 22.5Z\"><\u002Fpath>\n            <path d=\"M18 9.5 22.5 14\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Always Editable<\u002Fh3>\n        <p>Every translation stays yours. Tweak a phrase, restore your voice, regenerate a sentence — nothing is locked in.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"feature\">\n        <div class=\"feature-num\">04<\u002Fdiv>\n        <div class=\"feature-icon\">\n          <svg viewBox=\"0 0 32 32\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M8 4h12l6 6v18H8z\"><\u002Fpath>\n            <path d=\"M20 4v6h6\"><\u002Fpath>\n            <path d=\"M13 17h10M13 21h10M13 13h6\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Full Narrative Export<\u002Fh3>\n        <p>When you're ready, pull the whole application out as one clean, polished narrative — paste straight into the funder's form.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FINAL CTA ============ -->\n<section class=\"final\">\n  <div class=\"wrap\">\n    <div class=\"final-card reveal\">\n      <div class=\"final-inner\">\n        <div>\n          <h2>Stop translating in your head. <em>Start translating on the page.<\u002Fem><\u002Fh2>\n          <p class=\"final-sub\">Free to use. Built for small teams doing big work.<\u002Fp>\n        <\u002Fdiv>\n        <a class=\"btn btn-cream\" href=\"https://avocado-grant-hub--viscouscoup.replit.app/\" target=\"_blank\" rel=\"noopener\">\n          Translate Your Grant\n          <span class=\"arrow\" aria-hidden=\"true\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer class=\"site\">\n  <div class=\"wrap\">\n    <div class=\"foot\">\n      <a class=\"brand\" href=\"#\" aria-label=\"The AVOCADO HUB\">\n        <img class=\"logo\" src=\"3b9986cf-2653-4c47-9f54-1b1b055fe720\" alt=\"The AVOCADO HUB\">\n      <\u002Fa>\n      <span>© The AVOCADO HUB · The Grant Writing Translator<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // ---------- Scroll reveal ----------\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        e.target.classList.add('in');\n        if (e.target.dataset.once !== 'false') io.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.15 });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n  // ---------- Feature stagger ----------\n  const features = document.querySelectorAll('.feature');\n  const fio = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        const idx = [...features].indexOf(e.target);\n        e.target.style.transitionDelay = (idx * 90) + 'ms';\n        e.target.classList.add('in');\n        fio.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.2 });\n  features.forEach(el => fio.observe(el));\n\n  // ---------- Explanation word-by-word reveal ----------\n  (function () {\n    const el = document.getElementById('explain-copy');\n    // Walk text nodes only — keep .accent span intact\n    function wrapWords(node) {\n      const frag = document.createDocumentFragment();\n      const parts = node.textContent.split(/(\\s+)/);\n      parts.forEach(p => {\n        if (/^\\s+$/.test(p) || p === '') {\n          frag.appendChild(document.createTextNode(p));\n        } else {\n          const s = document.createElement('span');\n          s.className = 'word';\n          s.textContent = p;\n          frag.appendChild(s);\n        }\n      });\n      node.parentNode.replaceChild(frag, node);\n    }\n    function walk(n) {\n      [...n.childNodes].forEach(child => {\n        if (child.nodeType === 3) wrapWords(child);\n        else if (child.nodeType === 1) {\n          if (child.classList.contains('accent')) {\n            // Wrap words inside accent but keep the span wrapper\n            walk(child);\n          } else walk(child);\n        }\n      });\n    }\n    walk(el);\n\n    const words = el.querySelectorAll('.word');\n    const section = document.getElementById('explain');\n    const sio = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          section.classList.add('in');\n          words.forEach((w, i) => {\n            w.style.transitionDelay = (i * 22) + 'ms';\n          });\n          sio.unobserve(section);\n        }\n      });\n    }, { threshold: 0.25 });\n    sio.observe(section);\n  })();\n\n  // ---------- Translation demo typing ----------\n  (function () {\n    const beforeEl = document.getElementById('before-text');\n    const afterEl  = document.getElementById('after-text');\n\n    const pairs = [\n      {\n        before: \"We're a tiny team and honestly we don't have much data yet but we know it's working because parents keep coming back and telling us their kids are happier.\",\n        after:  \"Although still in our early phase, qualitative evidence from returning families consistently indicates a strong positive impact on participants' wellbeing — a foundation we are now formalising into structured outcome measurement.\"\n      },\n      {\n        before: \"We tried this last year and it kind of fell apart halfway through but we learned a lot and want to do it properly this time.\",\n        after:  \"A pilot delivered last year surfaced critical learnings around delivery capacity and partnership design. This proposal applies those insights directly, with a strengthened operational model built for sustained impact.\"\n      },\n      {\n        before: \"Loads of the young people we work with are dealing with stuff at home and just need somewhere safe to be. That's basically what we offer.\",\n        after:  \"Our provision responds to a clear local need: young people facing adverse circumstances at home require consistent, trauma-informed spaces. We provide a stable, supervised environment that prioritises safety, belonging and trusted adult relationships.\"\n      }\n    ];\n\n    let pairIndex = 0;\n    let running = false;\n\n    const speedBefore = 22;   // ms per char\n    const speedAfter  = 14;\n    const holdAfter   = 2800;\n    const swapPause   = 600;\n\n    function typeInto(el, text, speed) {\n      return new Promise(resolve => {\n        el.classList.remove('done');\n        el.textContent = '';\n        let i = 0;\n        function tick() {\n          el.textContent = text.slice(0, i);\n          if (i < text.length) {\n            i++;\n            setTimeout(tick, speed + Math.random() * 18);\n          } else {\n            resolve();\n          }\n        }\n        tick();\n      });\n    }\n\n    async function runCycle() {\n      if (running) return;\n      running = true;\n      while (true) {\n        const p = pairs[pairIndex];\n        afterEl.textContent = '';\n        afterEl.classList.remove('done');\n        await typeInto(beforeEl, p.before, speedBefore);\n        beforeEl.classList.add('done');\n        await new Promise(r => setTimeout(r, swapPause));\n        await typeInto(afterEl, p.after, speedAfter);\n        afterEl.classList.add('done');\n        await new Promise(r => setTimeout(r, holdAfter));\n        pairIndex = (pairIndex + 1) % pairs.length;\n      }\n    }\n\n    // Start only when the demo enters view\n    const demo = document.querySelector('.demo');\n    const dio = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          runCycle();\n          dio.unobserve(demo);\n        }\n      });\n    }, { threshold: 0.3 });\n    dio.observe(demo);\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
