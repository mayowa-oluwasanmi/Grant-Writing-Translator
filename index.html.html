document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"cb383d82-ec6a-49e2-9da2-562c0a6ba618\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"d5e9d066-f48e-4c34-accd-dbdcec3d2078\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"3587fbac-b839-4edb-8a86-b2c34a800cd2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"8dee8048-0216-42a9-a236-38432bba19f6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    --green-900: #033220;\n    --green-700: #0a4a30;\n    --green-500: #257F00;\n    --cream:     #FFEFE6;\n    --cream-2:   #FBE3D5;\n    --ink:       #1a1f1c;\n    --muted:     #5b6660;\n    --rule:      rgba(3,50,32,0.14);\n\n    --serif: \"DM Serif Display\", \"Times New Roman\", serif;\n    --sans:  \"Barlow\", system-ui, -apple-system, \"Segoe UI\", Helvetica, Arial, sans-serif;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: var(--sans);\n    background: var(--cream);\n    color: var(--green-900);\n    font-size: 17px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n  ::selection { background: var(--green-900); color: var(--cream); }\n  a { color: inherit; }\n\n  .wrap { width: 100%; max-width: 1240px; margin: 0 auto; padding: 0 32px; }\n\n  /* ---------- BRAND HEAD (logo only, no nav) ---------- */\n  .brandbar {\n    padding: 28px 0 8px;\n  }\n  .brand {\n    display: inline-flex;\n    align-items: center;\n    gap: 12px;\n    font-family: var(--serif);\n    font-weight: 400;\n    letter-spacing: 0;\n    font-size: 20px;\n    color: var(--green-900);\n    text-decoration: none;\n  }\n  .brand-mark {\n    width: 38px; height: 38px;\n    border-radius: 50%;\n    background: var(--green-900);\n    display: grid; place-items: center;\n    color: var(--cream);\n    font-family: var(--serif);\n    font-size: 21px;\n    line-height: 1;\n  }\n  .brand small {\n    display: block;\n    font-family: var(--sans);\n    font-size: 11px;\n    font-weight: 500;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-top: 2px;\n  }\n\n  /* ---------- HERO ---------- */\n  .hero {\n    padding: 56px 0 96px;\n    border-bottom: 1px solid var(--rule);\n  }\n  .eyebrow {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--green-500);\n    margin-bottom: 28px;\n  }\n  .eyebrow .dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--green-500);\n    box-shadow: 0 0 0 4px rgba(37,127,0,0.18);\n  }\n  h1.hero-h {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: clamp(48px, 7vw, 104px);\n    line-height: 1.02;\n    letter-spacing: -0.015em;\n    margin: 0 0 28px;\n    max-width: 16ch;\n  }\n  h1.hero-h em {\n    font-style: italic;\n    color: var(--green-500);\n  }\n  .hero-sub {\n    font-size: clamp(17px, 1.4vw, 21px);\n    line-height: 1.5;\n    max-width: 50ch;\n    color: var(--ink);\n    margin: 0 0 40px;\n  }\n  .hero-cta-row {\n    display: flex;\n    align-items: center;\n    gap: 22px;\n    flex-wrap: wrap;\n  }\n  .btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 14px;\n    background: var(--green-900);\n    color: var(--cream);\n    text-decoration: none;\n    padding: 20px 30px;\n    border-radius: 999px;\n    font-weight: 500;\n    font-size: 16px;\n    letter-spacing: 0.005em;\n    transition: transform .15s ease, background .15s ease;\n  }\n  .btn:hover { background: var(--green-700); transform: translateY(-1px); }\n  .btn .arrow {\n    width: 24px; height: 24px; border-radius: 50%;\n    background: var(--green-500);\n    display: grid; place-items: center;\n    color: var(--cream);\n    font-size: 13px;\n  }\n  .hero-meta {\n    font-size: 13px;\n    color: var(--muted);\n    letter-spacing: 0.04em;\n  }\n  .hero-meta strong { color: var(--green-900); font-weight: 600; }\n\n  .hero-grid {\n    display: grid;\n    grid-template-columns: 1.05fr 1fr;\n    gap: 80px;\n    align-items: center;\n  }\n\n  /* Translator demo card */\n  .demo {\n    background: #fff;\n    border: 1px solid var(--rule);\n    border-radius: 18px;\n    padding: 22px;\n    box-shadow: 0 30px 60px -30px rgba(3,50,32,0.25), 0 8px 24px -16px rgba(3,50,32,0.15);\n  }\n  .demo-bar {\n    display: flex; align-items: center; justify-content: space-between;\n    margin-bottom: 18px;\n    padding-bottom: 14px;\n    border-bottom: 1px dashed var(--rule);\n  }\n  .demo-tabs { display: flex; gap: 6px; }\n  .demo-tab {\n    font-size: 11px;\n    font-weight: 600;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    padding: 6px 12px;\n    border-radius: 999px;\n    color: var(--muted);\n  }\n  .demo-tab.active {\n    background: var(--green-900);\n    color: var(--cream);\n  }\n  .demo-section {\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--green-500);\n    font-weight: 600;\n  }\n  .demo-pair {\n    display: grid;\n    grid-template-columns: 1fr;\n    gap: 14px;\n  }\n  .demo-box {\n    border: 1px solid var(--rule);\n    border-radius: 12px;\n    padding: 16px 18px;\n    background: var(--cream);\n    position: relative;\n  }\n  .demo-box.out {\n    background: var(--green-900);\n    color: var(--cream);\n    border-color: var(--green-900);\n  }\n  .demo-label {\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    font-weight: 700;\n    color: var(--muted);\n    margin-bottom: 8px;\n    display: flex; align-items: center; gap: 8px;\n  }\n  .demo-box.out .demo-label { color: rgba(255,239,230,0.6); }\n  .demo-text {\n    font-size: 15px;\n    line-height: 1.55;\n  }\n  .demo-text strong { color: var(--green-500); font-weight: 600; }\n  .demo-box.out .demo-text strong { color: #b6e29a; }\n  .translate-chip {\n    align-self: center;\n    background: var(--cream);\n    border: 1px solid var(--rule);\n    border-radius: 999px;\n    padding: 6px 14px;\n    font-size: 11px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    font-weight: 700;\n    color: var(--green-500);\n    display: inline-flex; align-items: center; gap: 8px;\n    width: max-content;\n    margin: 2px auto;\n  }\n\n  .demo-foot {\n    display: flex; justify-content: space-between; align-items: center;\n    margin-top: 18px;\n    padding-top: 14px;\n    border-top: 1px dashed var(--rule);\n    font-size: 12px;\n    color: var(--muted);\n  }\n  .demo-foot .progress { display: flex; gap: 4px; }\n  .demo-foot .progress span {\n    width: 28px; height: 4px; border-radius: 2px; background: rgba(3,50,32,0.12);\n  }\n  .demo-foot .progress span.done { background: var(--green-500); }\n\n  /* ---------- EXPLANATION ---------- */\n  .explain {\n    padding: 110px 0 100px;\n    border-bottom: 1px solid var(--rule);\n  }\n  .explain-grid {\n    display: grid;\n    grid-template-columns: 0.7fr 1.3fr;\n    gap: 80px;\n    align-items: start;\n  }\n  .section-tag {\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--green-500);\n  }\n  .explain-body {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: clamp(28px, 3.2vw, 44px);\n    line-height: 1.18;\n    letter-spacing: -0.005em;\n    margin: 0;\n    color: var(--green-900);\n  }\n  .explain-body em { font-style: italic; color: var(--green-500); }\n  .explain-rule {\n    display: flex;\n    gap: 18px;\n    margin-top: 44px;\n    flex-wrap: wrap;\n  }\n  .pill {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    background: var(--cream-2);\n    border: 1px solid var(--rule);\n    padding: 10px 16px;\n    border-radius: 999px;\n    font-size: 13px;\n    font-weight: 500;\n    letter-spacing: 0.01em;\n  }\n  .pill::before {\n    content: \"\";\n    width: 7px; height: 7px;\n    background: var(--green-500);\n    border-radius: 50%;\n  }\n\n  /* ---------- FEATURES ---------- */\n  .features-wrap {\n    background: var(--green-900);\n    color: var(--cream);\n  }\n  .features-wrap .section-tag { color: #b6e29a; }\n  .features-wrap .section-h { color: var(--cream); }\n  .features-wrap .section-lead { color: rgba(255,239,230,0.8); }\n\n  .features-section { padding: 120px 0; }\n  .section-head {\n    display: grid;\n    grid-template-columns: 0.7fr 1.3fr;\n    gap: 60px;\n    margin-bottom: 64px;\n    align-items: end;\n  }\n  .section-h {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: clamp(36px, 4.6vw, 64px);\n    line-height: 1.05;\n    letter-spacing: -0.01em;\n    margin: 14px 0 0;\n  }\n  .section-lead {\n    font-size: 19px;\n    line-height: 1.55;\n    max-width: 52ch;\n    margin: 0;\n  }\n\n  .features-grid {\n    display: grid;\n    grid-template-columns: repeat(2, 1fr);\n    gap: 1px;\n    background: rgba(255,239,230,0.14);\n    border: 1px solid rgba(255,239,230,0.14);\n    border-radius: 4px;\n  }\n  .feature {\n    background: var(--green-900);\n    padding: 48px 44px 52px;\n    display: flex;\n    flex-direction: column;\n    gap: 16px;\n    min-height: 300px;\n  }\n  .feature-icon {\n    width: 56px; height: 56px;\n    border-radius: 50%;\n    background: rgba(255,239,230,0.06);\n    border: 1px solid rgba(255,239,230,0.18);\n    display: grid; place-items: center;\n    margin-bottom: 12px;\n  }\n  .feature-h {\n    font-family: var(--serif);\n    font-size: 32px;\n    line-height: 1.1;\n    margin: 0;\n    font-weight: 400;\n  }\n  .feature-p {\n    color: rgba(255,239,230,0.78);\n    margin: 0;\n    font-size: 15.5px;\n    line-height: 1.6;\n    max-width: 38ch;\n  }\n  .feature-meta {\n    margin-top: auto;\n    padding-top: 24px;\n    font-size: 12px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: #b6e29a;\n    font-weight: 600;\n    display: flex;\n    align-items: center;\n    gap: 10px;\n  }\n  .feature-meta::before {\n    content: \"\";\n    height: 1px; width: 28px;\n    background: #b6e29a;\n  }\n\n  /* ---------- CTA ---------- */\n  .cta-section {\n    padding: 140px 0;\n    text-align: center;\n    background: var(--cream);\n    position: relative;\n    overflow: hidden;\n  }\n  .cta-section h2 {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: clamp(42px, 6.2vw, 88px);\n    line-height: 1.02;\n    letter-spacing: -0.015em;\n    margin: 0 auto 22px;\n    max-width: 18ch;\n  }\n  .cta-section rant writing tool for nonprofits, CICs and CIOs.<\u002Fp>\n      <div class=\"hero-cta-row\">\n        <a class=\"btn\" href=\"https://avocado-grant-hub--viscouscoup.replit.app/\">\n          Translate Your Grant\n          <span class=\"arrow\">→<\u002Fspan>\n        <\u002Fa>\n        <div class=\"hero-meta\">No sign-up required · <strong>100% free<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Translator demo -->\n    <div class=\"demo\" aria-hidden=\"true\">\n      <div class=\"demo-bar\">\n        <div class=\"demo-tabs\">\n          <span class=\"demo-tab active\">Translator<\u002Fspan>\n          <span class=\"demo-tab\">Sections<\u002Fspan>\n          <span class=\"demo-tab\">Export<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"demo-section\">Need / Beneficiaries<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"demo-pair\">\n        <div class=\"demo-box\">\n          <div class=\"demo-label\">Your words<\u002Fdiv>\n          <div class=\"demo-text\">\"Basically the council keeps sending us people who've got nowhere else to go. We're tiny but we don't turn anyone away — we're the only ones who'll <strong>actually pick up the phone<\u002Fstrong>.\"<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"translate-chip\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M1 6h10M7 2l4 4-4 4\" stroke=\"#257F00\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          Translate\n        <\u002Fdiv>\n\n        <div class=\"demo-box out\">\n          <div class=\"demo-label\">Funder-ready<\u002Fdiv>\n          <div class=\"demo-text\">Our organisation receives <strong>statutory and informal referrals<\u002Fstrong> from individuals excluded from mainstream services. As a community-embedded provider, we operate an <strong>open-door, no-rejection model<\u002Fstrong> — serving as a service of last resort for those with nowhere else to turn.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"demo-foot\">\n        <div>Section 3 of 7<\u002Fdiv>\n        <div class=\"progress\" aria-hidden=\"true\">\n          <span class=\"done\"><\u002Fspan><span class=\"done\"><\u002Fspan><span class=\"done\"><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n        <\u002Fdiv>\n        <div>Saved 2 mins ago<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EXPLANATION -->\n<section class=\"explain\">\n  <div class=\"wrap explain-grid\">\n    <div>\n      <div class=\"section-tag\">Why we built it<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <p class=\"explain-body\">Grant writing is hard when your reality doesn't match what funders want to hear. The Grant Writing Translator lets you write exactly what you mean in your own words and turns it into the <em>professional, compelling language funders expect.<\u002Fem> No blank page panic. No jargon. Just honest, fundable writing.<\u002Fp>\n      <div class=\"explain-rule\">\n        <span class=\"pill\">No blank page panic<\u002Fspan>\n        <span class=\"pill\">No jargon<\u002Fspan>\n        <span class=\"pill\">Honest, fundable writing<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FEATURES -->\n<section class=\"features-wrap\">\n  <div class=\"wrap features-section\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"section-tag\">What it does<\u002Fdiv>\n        <h2 class=\"section-h\">Four things, done properly.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-lead\">A guided writing surface designed around the way real applications get assessed — section by section, with the messy bits handled for you.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"features-grid\">\n      <article class=\"feature\">\n        <div class=\"feature-icon\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FFEFE6\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 7h16M4 12h10M4 17h16\"><\u002Fpath><path d=\"M16 14l4 3-4 3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"feature-h\">Reframes Weaknesses<\u002Fh3>\n        <p class=\"feature-p\">\"We're tiny and burnt out\" becomes \"lean, community-embedded delivery.\" Honest input, fundable output — without overclaiming.<\u002Fp>\n        <div class=\"feature-meta\">Feature 01<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"feature\">\n        <div class=\"feature-icon\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FFEFE6\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M9 4v16\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"feature-h\">Section by Section<\u002Fh3>\n        <p class=\"feature-p\">Need, beneficiaries, activities, outcomes, governance, sustainability. Tackle one box at a time — never stare at a blank form again.<\u002Fp>\n        <div class=\"feature-meta\">Feature 02<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"feature\">\n        <div class=\"feature-icon\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FFEFE6\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"feature-h\">Always Editable<\u002Fh3>\n        <p class=\"feature-p\">The translator suggests — you decide. Every line stays editable so the voice in the final application is still yours, not a chatbot's.<\u002Fp>\n        <div class=\"feature-meta\">Feature 03<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"feature\">\n        <div cl
